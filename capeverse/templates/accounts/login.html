{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CapeVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/loginstyle.css' %}">
</head>

<body>

<header class="py-3">
    <div class="container">
        <a class="navbar-brand fw-bold " href="/">CapeVerse</a>
    </div>
</header>

<div class="container py-4 mt-5">
    <div class="row justify-content-center">

        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <h2 class="text-center mb-4">Login to CapeVerse</h2>

            <form method="POST" class="login-form">
                {% csrf_token %}

                <div class="form-floating mb-3">
                    <input type="text" name="identifier" class="form-control" id="identifier"
                        placeholder="Email or Mobile Number" required>
                    <label for="identifier">Email Id or Mobile Number</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" name="password" class="form-control" id="password"
                        placeholder="Password" required>
                    <label for="password">Password</label>
                </div>

                {% if error %}
                <p class="text-danger text-center">{{ error }}</p>
                {% endif %}

                <button type="submit" class="btn btn-success w-100">
                    Login
                </button>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="{% url 'accounts:Signuppage' %}" class="text-decoration-none">
                        Signup here
                    </a>
                </p>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
