{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container mt-5 pt-5">
    <div class="card p-4">

        <h2>My Profile</h2>

        
        <div id="viewMode">
            <p><b>Name:</b> {{ user.name }}</p>
            <p><b>Age:</b> {{ user.age }}</p>
            <p><b>Mobile:</b> {{ user.mob }}</p>
            <p><b>Email:</b> {{ user.email }}</p>

            <button class="btn btn-primary" onclick="enableEdit()">
                Edit Profile
            </button>
        </div>

       
        <form method="POST" id="editMode" style="display:none;">
            {% csrf_token %}

            <div class="mb-2">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ user.name }}">
            </div>

            <div class="mb-2">
                <label>Age</label>
                <input type="number" name="age" class="form-control" value="{{ user.age }}">
            </div>

            <div class="mb-2">
                <label>Mobile</label>
                <input type="text" name="mob" class="form-control" value="{{ user.mob }}">
            </div>

            <div class="mb-2">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>

            <button type="submit" class="btn btn-success">
                Save Changes
            </button>

            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">
                Cancel
            </button>
        </form>

    </div>
</div>


<script src="{% static 'js/editprofile.js' %}"></script>

{% endblock %}
